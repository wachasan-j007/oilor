<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OR Retail Company</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0f172a;
  --border:rgba(148,163,184,.2);
  --text:#e2e8f0;
  --muted:#94a3b8;
  --accent:#38bdf8;
  --brand:#0ea5e9;
  --radius:16px;
}
*{box-sizing:border-box}
body{
  margin:0;
  min-height:100vh;
  font-family:"Prompt",sans-serif;
  color:var(--text);
  background:
    radial-gradient(circle at 12% 0%,rgba(56,189,248,.16),transparent 30%),
    radial-gradient(circle at 92% 12%,rgba(14,165,233,.12),transparent 28%),
    var(--bg);
}
a{color:inherit;text-decoration:none}
.shell{width:min(980px,calc(100% - 40px));margin:0 auto;padding:28px 0 56px}
.topbar{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:30px}
.back{
  display:inline-flex;align-items:center;gap:8px;
  color:var(--muted);font-size:14px;
  padding:10px 12px;border:1px solid var(--border);border-radius:10px;
  background:rgba(255,255,255,.035);
}
.back:hover{color:var(--text);border-color:rgba(56,189,248,.45)}
.hero{padding:24px 0 28px}
.eyebrow{font-size:12px;color:var(--accent);letter-spacing:2px;text-transform:uppercase;font-weight:600}
h1{font-size:clamp(30px,6vw,64px);line-height:1.05;margin:10px 0 12px}
.hero p{max-width:720px;color:var(--muted);font-size:16px;line-height:1.8;margin:0}
.grid{display:grid;grid-template-columns:minmax(280px,520px);gap:16px}
.company-card{
  min-height:300px;
  display:flex;flex-direction:column;justify-content:space-between;
  padding:24px;
  border:1px solid var(--border);
  border-radius:var(--radius);
  background:linear-gradient(160deg,rgba(255,255,255,.1),rgba(255,255,255,.025));
  box-shadow:0 24px 54px -34px rgba(14,165,233,.9);
  transition:transform .2s ease,border-color .2s ease,box-shadow .2s ease;
  overflow:hidden;
  position:relative;
}
.company-card::before{
  content:"";
  position:absolute;inset:auto -42px -64px auto;
  width:190px;height:190px;border-radius:50%;
  background:rgba(14,165,233,.22);
}
.company-card:hover{
  transform:translateY(-5px);
  border-color:rgba(56,189,248,.62);
  box-shadow:0 28px 64px -34px rgba(14,165,233,1);
}
.logo{
  width:240px;
  height:240px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.logo img{
  width:100%;
  height:100%;
  object-fit:contain;
  filter:drop-shadow(0 10px 20px rgba(0,0,0,.25));
  transition:.3s;
}

.logo:hover img{
  transform:scale(1.08);
}
.company-card h2{font-size:34px;margin:24px 0 10px}
.company-card p{margin:0;color:var(--muted);font-size:15px;line-height:1.7}
.metric{display:flex;align-items:center;justify-content:space-between;margin-top:24px;color:var(--muted);font-size:13px}
.metric strong{font-size:20px;color:var(--text)}
.cta{display:inline-flex;align-items:center;gap:8px;color:var(--text);font-size:14px;font-weight:600;margin-top:16px}
@media(max-width:720px){
  .shell{width:min(100% - 28px,980px)}
  .topbar{align-items:flex-start;flex-direction:column}
  .grid{grid-template-columns:1fr}
  .company-card{min-height:250px}
}
</style>
</head>
<body>
<main class="shell">
  <nav class="topbar" aria-label="Page navigation">
    <a class="back" href="index.html">← Fuel Value Chain</a>
    <a class="back" href="dashboard.html">Dashboard →</a>
  </nav>

  <section class="hero">
    <div class="eyebrow">Retail Operator</div>
    <p>ตอนนี้โฟกัสเฉพาะข้อมูล OR จากไฟล์ oil_prices_all.xlsx ก่อน เพื่อให้ dashboard ใช้ข้อมูลชุดเดียวชัด ๆ และลดความสับสนจากบริษัทอื่น</p>
  </section>

  <section class="grid" aria-label="OR company card">
    <a class="company-card" href="dashboard.html?company=OR">
      <div>
        <div class="logo"> <img src="picture/or-logo-sm.png" alt="OR Logo"> </div>
        <h2>OR</h2>
        <p>เครือข่าย OR Station และข้อมูลราคาน้ำมันขายปลีกที่ดึงจากไฟล์ Excel ในโปรเจกต์นี้</p>
      </div>
      <div>
        <div class="metric"><span>Data source</span><strong>Excel</strong></div>
        <span class="cta">เปิด Dashboard →</span>
      </div>
    </a>
  </section>
</main>
</body>
</html>
