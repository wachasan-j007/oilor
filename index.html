<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fuel Value Chain</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0f172a;
  --panel:rgba(255,255,255,.05);
  --panel-border:rgba(148,163,184,.2);
  --text-hi:#e2e8f0;
  --text-lo:#94a3b8;
  --upstream:#38bdf8;
  --intermediate:#a78bfa;
  --downstream:#fbbf24;
  --endcustomer:#34d399;
  --radius:16px;
}
*{box-sizing:border-box}
html,body{
  margin:0;
  min-height:100%;
  background:
    radial-gradient(circle at 18% -10%, rgba(56,189,248,.13), transparent 38%),
    radial-gradient(circle at 86% 6%, rgba(251,191,36,.11), transparent 28%),
    var(--bg);
  color:var(--text-hi);
  font-family:"Prompt",sans-serif;
}
a{color:inherit;text-decoration:none}
.page-header{text-align:center;padding:34px 20px 8px}
.eyebrow{font-size:12px;color:var(--text-lo);letter-spacing:2px;text-transform:uppercase}
.page-header h1{font-size:clamp(24px,4vw,42px);font-weight:700;margin:8px 0 8px}
.page-header p{margin:0;color:var(--text-lo);font-size:14px}
.chain-wrap{padding:26px 28px 58px;overflow-x:auto}
.flow-wrap{position:relative;min-width:1180px;max-width:1500px;margin:0 auto}
.section-title-row{display:grid;grid-template-columns:repeat(4,1fr);gap:64px;margin-bottom:14px}
.section-title{
  text-align:center;
  font-size:13px;
  letter-spacing:1.2px;
  text-transform:uppercase;
  font-weight:600;
  padding:10px 0;
  border-radius:10px;
  border:1px solid var(--panel-border);
  background:rgba(255,255,255,.035);
}
.section-title.upstream{color:var(--upstream);box-shadow:inset 0 0 0 1px rgba(56,189,248,.22)}
.section-title.intermediate{color:var(--intermediate);box-shadow:inset 0 0 0 1px rgba(167,139,250,.22)}
.section-title.downstream{color:var(--downstream);box-shadow:inset 0 0 0 1px rgba(251,191,36,.22)}
.section-title.endcustomer{color:var(--endcustomer);box-shadow:inset 0 0 0 1px rgba(52,211,153,.22)}
.flow-grid{position:relative;display:grid;grid-template-columns:repeat(4,1fr);gap:64px;min-height:680px}
.stage-col{display:flex;flex-direction:column;justify-content:flex-start;gap:20px;position:relative;z-index:2;padding-top:20px}
.group-label{
  font-size:12px;
  text-align:center;
  color:var(--text-hi);
  font-weight: 500;
  background:rgba(255,255,255,.08);
  border:1px solid var(--panel-border);
  border-radius:8px;
  padding:6px 0;
  margin-bottom: 4px;
}
.group-divider{height:1px;background:linear-gradient(90deg,transparent,var(--panel-border),transparent); margin: 8px 0;}
.node{
  background:linear-gradient(160deg,rgba(255,255,255,.07),rgba(255,255,255,.02));
  border:1px solid var(--panel-border);
  border-radius:var(--radius);
  padding:15px 16px;
  position:relative;
  backdrop-filter:blur(8px);
  transition:transform .22s ease,box-shadow .22s ease,border-color .22s ease;
  opacity:0;
  transform:translateY(14px);
  animation:fadeInUp .55s ease forwards;
}

/* Custom Spacing */
.node[data-id="I1"] { margin-top: 130px; }
.node[data-id="I2"] { 
  margin-top: 100px;
  margin-left: calc(50% + 32px); 
  width: 100%;
  position: relative;
  z-index: 10;
}
.node[data-id="D1"] { margin-top: 130px; }
.node[data-id="E2"] { margin-top: 45px; }

@keyframes fadeInUp{to{opacity:1;transform:translateY(0)}}
.node:hover,.node.link-node:focus-visible{
  transform:scale(1.04) translateY(-2px);
  box-shadow:0 18px 38px -15px var(--node-glow,rgba(56,189,248,.5));
  border-color:var(--node-color,var(--upstream));
}
.node.link-node{
  cursor:pointer;
  display:block;
}
.node.link-node .node-name {
  color: var(--endcustomer);
  text-decoration: underline;
  text-underline-offset: 4px;
}
.node-top{display:flex;align-items:center;justify-content:space-between;gap:12px}
.node-name{font-size:14px;font-weight:500;line-height:1.45;transition:color .2s}
.node-icon{
  width:34px;height:34px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;flex:0 0 auto;
  background:rgba(255,255,255,.06);
  border:1px solid var(--panel-border);
}
.node[data-stage=upstream]{--node-color:var(--upstream);--node-glow:rgba(56,189,248,.45)}
.node[data-stage=intermediate]{--node-color:var(--intermediate);--node-glow:rgba(167,139,250,.45)}
.node[data-stage=downstream]{--node-color:var(--downstream);--node-glow:rgba(251,191,36,.45)}
.node[data-stage=endcustomer]{--node-color:var(--endcustomer);--node-glow:rgba(52,211,153,.45)}
.flow-svg{position:absolute;inset:0;width:100%;height:100%;z-index:1;overflow:visible;pointer-events:none}
.flow-line{
  fill:none;
  stroke-width:2.2;
  stroke-linecap:round;
  stroke-dasharray:10 8;
  animation:flowDash 6s linear infinite;
  opacity:.86;
}
@keyframes flowDash{to{stroke-dashoffset:-180}}
@media(max-width:1024px){.chain-wrap{padding:20px 14px 50px}}
</style>
</head>
<body>
<header class="page-header">
  <div class="eyebrow">Supply Chain Overview</div>
  <h1>Fuel Value Chain</h1>
  <p>ห่วงโซ่อุปทานน้ำมันเชื้อเพลิง จากต้นน้ำสู่ผู้ใช้ปลายทาง</p>
</header>

<main class="chain-wrap">
  <section class="flow-wrap" aria-label="Fuel value chain">
    <div class="section-title-row">
      <div class="section-title upstream">Upstream</div>
      <div class="section-title intermediate">Intermediate</div>
      <div class="section-title downstream">Downstream</div>
      <div class="section-title endcustomer">End Customer</div>
    </div>

    <svg class="flow-svg" id="flow-svg">
      <defs>
        <marker id="arrow-upstream" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
          <path d="M0,0 L10,5 L0,10 Z" fill="#38bdf8"></path>
        </marker>
        <marker id="arrow-intermediate" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
          <path d="M0,0 L10,5 L0,10 Z" fill="#a78bfa"></path>
        </marker>
        <marker id="arrow-downstream" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
          <path d="M0,0 L10,5 L0,10 Z" fill="#fbbf24"></path>
        </marker>
      </defs>
    </svg>

    <div class="flow-grid" id="flow-grid">
      <div class="stage-col" id="col-upstream"></div>
      <div class="stage-col" id="col-intermediate"></div>
      <div class="stage-col" id="col-downstream"></div>
      <div class="stage-col" id="col-endcustomer"></div>
    </div>
  </section>
</main>

<script>
const STAGE_META = {
  upstream:{color:"#38bdf8"},
  intermediate:{color:"#a78bfa"},
  downstream:{color:"#fbbf24"},
  endcustomer:{color:"#34d399"}
};

const NODES = [
  {id:"U1",name:"แหล่งผลิตน้ำมันดิบในประเทศ",stage:"upstream",icon:"🛢️"},
  {id:"U2",name:"แหล่งผลิตบนบกและนอกชายฝั่ง",stage:"upstream",icon:"🏗️"},
  {id:"U3",name:"นำเข้าน้ำมันดิบ",stage:"upstream",icon:"🚢"},
  {id:"U4",name:"นำเข้าน้ำมันสำเร็จรูป",stage:"upstream",icon:"📦"},
  {id:"I1",name:"โรงกลั่นน้ำมัน",stage:"intermediate",icon:"🏭"},
  {id:"I2",name:"เอทานอลหรือไบโอดีเซลสำหรับผสม",stage:"intermediate",icon:"🧪"},
  {id:"D1",name:"คลังน้ำมันเชื้อเพลิง",stage:"downstream",icon:"🏬"},
  {id:"E1",name:"ส่งออกน้ำมันดิบ",stage:"endcustomer",icon:"🌍"},
  {id:"E2",name:"ส่งออกน้ำมันสำเร็จรูป",stage:"endcustomer",icon:"✈️"},
  {id:"E3",name:"สถานีบริการน้ำมันเชื้อเพลิง",stage:"endcustomer",icon:"⛽", link:"companies.html"}
];

const CONNECTIONS = [
  ["U1","E1"],
  ["U1","I1"],
  ["U2","I1"],
  ["U3","I1"],
  ["U4","I1"], // เพิ่มเส้น U4 ไป I1
  ["U4","D1"],
  ["I1","D1"],
  ["I2","I1"],
  ["I2","D1"],
  ["D1","E2"],
  ["D1","E3"]
];

const stageColEl = {
  upstream:document.getElementById("col-upstream"),
  intermediate:document.getElementById("col-intermediate"),
  downstream:document.getElementById("col-downstream"),
  endcustomer:document.getElementById("col-endcustomer")
};

NODES.forEach((node,index)=>{
  const isLink = !!node.link;
  const el = document.createElement(isLink ? "a" : "div");
  if(isLink){
      el.href = node.link;
  }
  
  el.className = "node" + (isLink ? " link-node" : "");
  el.dataset.stage = node.stage;
  el.dataset.id = node.id;
  el.style.animationDelay = `${index * .045}s`;
  el.innerHTML = `
    <div class="node-top">
      <div>
        <div class="node-name">${node.name}</div>
      </div>
      <div class="node-icon">${node.icon}</div>
    </div>`;
  stageColEl[node.stage].appendChild(el);
});

function insertGroupLabel(beforeNodeId,text){
  const target = document.querySelector(`.node[data-id="${beforeNodeId}"]`);
  const label = document.createElement("div");
  label.className = "group-label";
  label.textContent = text;
  target.parentNode.insertBefore(label,target);
}

function insertDivider(beforeNodeId){
  const target = document.querySelector(`.node[data-id="${beforeNodeId}"]`);
  const divider = document.createElement("div");
  divider.className = "group-divider";
  target.parentNode.insertBefore(divider,target);
}

insertGroupLabel("U1","ผลิตในประเทศ");
insertDivider("U3");
insertGroupLabel("U3","นำเข้าต่างประเทศ");

insertGroupLabel("E1","ส่งออกต่างประเทศ");
insertDivider("E3");

const svg = document.getElementById("flow-svg");
const flowWrap = document.querySelector(".flow-wrap");

function drawConnections(){
  svg.querySelectorAll(".flow-line").forEach(el=>el.remove());
  const wrapRect = flowWrap.getBoundingClientRect();
  svg.setAttribute("viewBox",`0 0 ${wrapRect.width} ${wrapRect.height}`);
  
  const u1El = document.querySelector('.node[data-id="U1"]');
  const u1Rect = u1El ? u1El.getBoundingClientRect() : null;
  const upstreamMergeX = u1Rect ? u1Rect.right - wrapRect.left + 32 : 0;

  CONNECTIONS.forEach(([fromId,toId])=>{
    const fromEl = document.querySelector(`.node[data-id="${fromId}"]`);
    const toEl = document.querySelector(`.node[data-id="${toId}"]`);
    if(!fromEl || !toEl) return;
    
    const fr = fromEl.getBoundingClientRect();
    const tr = toEl.getBoundingClientRect();
    
    let x1 = fr.right - wrapRect.left;
    let y1 = fr.top - wrapRect.top + fr.height/2;
    let x2 = tr.left - wrapRect.left;
    let y2 = tr.top - wrapRect.top + tr.height/2;
    
    let d = "";
    
    if (toId === "I1" && ["U1", "U2", "U3"].includes(fromId)) {
      d = `M ${x1} ${y1} L ${upstreamMergeX} ${y1} L ${upstreamMergeX} ${y2} L ${x2} ${y2}`;
    }
    else if (fromId === "D1" && ["E2", "E3"].includes(toId)) {
      const forkX = x1 + 32;
      d = `M ${x1} ${y1} L ${forkX} ${y1} L ${forkX} ${y2} L ${x2} ${y2}`;
    }
    // I2 -> I1 (ขึ้นไปด้านล่างโรงกลั่น - ชิดขวา)
    else if (fromId === "I2" && toId === "I1") {
      x1 = fr.left + (fr.width * 0.25) - wrapRect.left; 
      y1 = fr.top - wrapRect.top; 
      x2 = tr.left + (tr.width * 0.75) - wrapRect.left; 
      y2 = tr.bottom - wrapRect.top; 
      const turnY = y1 - 25;
      d = `M ${x1} ${y1} L ${x1} ${turnY} L ${x2} ${turnY} L ${x2} ${y2}`;
    }
    // I2 -> D1 (ขึ้นไปด้านล่างคลังน้ำมัน - ชิดซ้าย)
    else if (fromId === "I2" && toId === "D1") {
      x1 = fr.left + (fr.width * 0.75) - wrapRect.left; 
      y1 = fr.top - wrapRect.top; 
      x2 = tr.left + (tr.width * 0.25) - wrapRect.left; 
      y2 = tr.bottom - wrapRect.top;
      const turnY = y1 - 25;
      d = `M ${x1} ${y1} L ${x1} ${turnY} L ${x2} ${turnY} L ${x2} ${y2}`;
    }
    else if (fromId === "U1" && toId === "E1") {
      y1 = y1 - 18; 
      y2 = y2 - 18;
      d = `M ${x1} ${y1} L ${x2} ${y2}`;
    }
    // U4 -> I1 วิ่งแนวนอนแล้วเลี้ยวขึ้นเข้าใต้โรงกลั่น (ชิดซ้าย จะได้ไม่ทับ I2)
    else if (fromId === "U4" && toId === "I1") {
      x2 = tr.left + (tr.width * 0.25) - wrapRect.left; 
      y2 = tr.bottom - wrapRect.top;
      d = `M ${x1} ${y1} L ${x2} ${y1} L ${x2} ${y2}`;
    }
    // U4 -> D1 วิ่งแนวนอนไปสุด แล้วเลี้ยวขึ้นเข้าใต้คลังน้ำมัน (ชิดขวา)
    else if (fromId === "U4" && toId === "D1") {
      x2 = tr.left + (tr.width * 0.75) - wrapRect.left; 
      y2 = tr.bottom - wrapRect.top;
      d = `M ${x1} ${y1} L ${x2} ${y1} L ${x2} ${y2}`;
    }
    else {
      const midX = x1 + (x2 - x1) / 2;
      d = Math.abs(y1-y2)<5 ? `M ${x1} ${y1} L ${x2} ${y2}` : `M ${x1} ${y1} L ${midX} ${y1} L ${midX} ${y2} L ${x2} ${y2}`;
    }
    
    const stage = NODES.find(n=>n.id===fromId).stage;
    const path = document.createElementNS("http://www.w3.org/2000/svg","path");
    path.setAttribute("d",d);
    path.setAttribute("class","flow-line");
    path.setAttribute("stroke",STAGE_META[stage].color);
    path.setAttribute("marker-end", `url(#arrow-${stage})`);
    svg.appendChild(path);
  });
}

window.addEventListener("load",drawConnections);
window.addEventListener("resize",()=>requestAnimationFrame(drawConnections));
setTimeout(drawConnections,150);
</script>
</body>
</html>
